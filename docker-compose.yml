name: decifra
services:
  weaviate:
    container_name: weaviate-${RAG_ENV:-decifra}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.2
    environment:
      QUERY_DEFAULTS: hybrid
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      ENABLE_API_BASED_MODULES: "true"
      ENABLE_SINGLE_NODE: "true"
      # Embedding via Voyage (externo), não HuggingFace interno.
      DEFAULT_VECTORIZER_MODULE: none
    ports:
      - 8081:8080
      - 50051:50051
    volumes:
      - weaviate-data-v2:/var/lib/weaviate
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider --tries=1 http://localhost:8080/v1/.well-known/ready || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "1"
    networks:
      - decifra-network
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"   # painel de gerenciamento, util pra debugar
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "1"
    networks:
      - decifra-network
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - decifra-network
networks:
  decifra-network:
    driver: bridge
volumes:
  weaviate-data-v2:
